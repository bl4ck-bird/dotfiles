# ============================================================
# 1. 서버 / 터미널 옵션
# ============================================================
# 기본 터미널 색상을 256색으로 설정
set -g default-terminal "tmux-256color"
# Ghostty(xterm)에서 True Color(24-bit)를 지원하도록 오버라이드
set-option -sa terminal-overrides ",xterm*:Tc"
# Esc 키 입력 지연 제거 (vim 등에서 응답성 개선)
set -s escape-time 0

# ============================================================
# 2. 세션 기본 옵션
# ============================================================
# History limit
set-option -g history-limit 100000

# 마우스 완벽 지원 (창 크기 조절, 패널 선택, 스크롤)
set -g mouse on
set -g cursor-style blinking-bar

# 창(Window)과 패널(Pane)의 시작 번호를 0이 아닌 1로 변경 (키보드 접근성)
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# ============================================================
# 3. Prefix
# ============================================================
# Prefix 키 변경 (기본 Ctrl+b를 Ctrl+a로 변경)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ============================================================
# 4. 키 / 마우스 바인딩
# ============================================================
# 패널 종료 시 확인 프롬프트 생략
bind-key x kill-pane

# Ctrl+L: 일반 쉘에선 화면 + tmux 스크롤백까지 클리어, alternate screen(vim/less/htop 등)에선 그대로 통과
bind -n C-l if-shell -F '#{alternate_on}' 'send-keys C-l' 'send-keys -R C-l; clear-history'

# 드래그 설정: 드래그 종료 시 하이라이트만 유지 (자동 복사 방지)
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection

# 더블 클릭 설정: 단어만 선택 (자동 복사 방지)
unbind -n DoubleClick1Pane
unbind -T copy-mode-vi DoubleClick1Pane
bind-key -n DoubleClick1Pane copy-mode -M \; send-keys -X select-word
bind-key -T copy-mode-vi DoubleClick1Pane send-keys -X select-word

# 트리플 클릭 설정: 라인만 선택 (자동 복사 방지)
unbind -n TripleClick1Pane
unbind -T copy-mode-vi TripleClick1Pane
bind-key -n TripleClick1Pane copy-mode -M \; send-keys -X select-line
bind-key -T copy-mode-vi TripleClick1Pane send-keys -X select-line

# 수동 복사: 'y' 키 입력 시 클립보드로 복사하고 **즉시 비주얼 모드 종료**
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# 선택 해제: 빈 공간 클릭 또는 Esc 입력 시 하이라이트 해제 및 일반 모드 복귀
# bind-key -T copy-mode-vi MouseDown1Pane send-keys -X cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel

# ============================================================
# 5. 외관 (Status bar)
# ============================================================
# 상태 표시줄 상단으로 변경
set-option -g status-position top

# 배경을 투명하게 하거나 터미널 배경색과 맞춤 (Ghostty 테마와 융합)
set -g status-style bg="#242424",fg=white
# 현재 활성화된 창(Window)의 이름은 눈에 띄게 하이라이트
set -wg window-status-current-style bg="#4CAF50",fg=black,bold

# 좌측: 세션 이름만 깔끔하게 노출
set -g status-left "#[fg=blue,bold] #S #[default] "
set -g status-left-length 20

# 우측: 시간이나 기타 잡다한 정보 제거
set -g status-right ""

# ============================================================
# 6. 플러그인 (TPM)
# ============================================================
# TMUX_PLUGIN_MANAGER_PATH 환경변수 설정
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$XDG_DATA_HOME/tmux/plugins"

# 기본 플러그인
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# TPM 자동 설치
if "test ! -d $TMUX_PLUGIN_MANAGER_PATH/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm $TMUX_PLUGIN_MANAGER_PATH/tpm && $TMUX_PLUGIN_MANAGER_PATH/tpm/bin/install_plugins && tmux source $XDG_CONFIG_HOME/tmux/tmux.conf'"

# TPM 초기화 실행 (반드시 맨 마지막)
run "$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm"
