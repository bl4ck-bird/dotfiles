
# 기본 터미널 색상을 256색으로 설정
set -g default-terminal "tmux-256color"
# Ghostty(xterm)에서 True Color(24-bit)를 지원하도록 오버라이드
set-option -sa terminal-overrides ",xterm*:Tc"

# 마우스 완벽 지원 (창 크기 조절, 패널 선택, 스크롤)
set -g mouse on

# 창(Window)과 패널(Pane)의 시작 번호를 0이 아닌 1로 변경 (키보드 접근성)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Prefix 키 변경 (기본 Ctrl+b를 Ctrl+a로 변경)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 패널 종료 시 확인 프롬프트 생략
bind-key x kill-pane

# 상태 표시줄 상단으로 변경
set-option -g status-position top

# 배경을 투명하게 하거나 터미널 배경색과 맞춤 (Ghostty 테마와 융합)
set -g status-style bg="#242424",fg=white
# 현재 활성화된 창(Window)의 이름은 눈에 띄게 하이라이트
set -wg window-status-current-style bg="#4CAF50",fg=black,bold

# 좌측: 세션 이름만 깔끔하게 노출
set -g status-left "#[fg=blue,bold] #S #[default] "
set -g status-left-length 20

# 우측: 시간이나 기타 잡다한 정보 제거
set -g status-right ""

# TMUX_PLUGIN_MANAGER_PATH 환경변수 설정
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$XDG_DATA_HOME/tmux/plugins"

# 기본 플러그인
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# TPM 자동 설치
if "test ! -d $TMUX_PLUGIN_MANAGER_PATH/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm $TMUX_PLUGIN_MANAGER_PATH/tpm && tmux source $XDG_CONFIG_HOME/tmux/tmux.conf'"

# TPM 초기화 실행
run "$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm"
